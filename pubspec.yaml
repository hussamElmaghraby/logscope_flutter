name: logscope_flutter
description: Zero-config in-app debug console with automatic issue-layer classification, structured HTTP cards, Dio interceptor, device info tab, and a draggable FAB overlay.
version: 0.4.1
homepage: https://github.com/hussamElmaghraby/logscope_flutter
repository: https://github.com/hussamElmaghraby/logscope_flutter
issue_tracker: https://github.com/hussamElmaghraby/logscope_flutter/issues
topics:
  - logging
  - debug
  - dio
  - developer-tools

screenshots:
  - description: 'Draggable debug FAB with error badge and toast overlay'
    path: screenshots/fab_overlay.png
  - description: 'Fullscreen log console with filters, search, and layer badges'
    path: screenshots/log_console.png
  - description: 'Structured HTTP request/response cards with layer classification'
    path: screenshots/http_cards.png
  - description: 'Automatic issue-layer classification system diagram'
    path: screenshots/layer_classification.png
  - description: 'Device & App Info tab with auto-detected platform details'
    path: screenshots/device_info_tab.png

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.8.0+1
  package_info_plus: ^8.3.0
  path_provider: ^2.1.5
  share_plus: ">=10.0.0 <14.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
